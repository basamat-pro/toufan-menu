<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>سلة عصائر طوفان</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Tajawal', 'Segoe UI', system-ui, sans-serif;
      background: #fef7e8;
      padding: 20px;
      padding-bottom: 80px;
    }

    /* زر إفراغ السلة */
    .empty-cart-btn {
      background-color: #e53e3e;
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 18px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 280px;
      margin: 20px auto;
      display: block;
    }

    .empty-cart-btn:active {
      transform: scale(0.97);
    }

    /* المودال الأنيق */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: all 0.25s ease;
    }

    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .modal-container {
      background: white;
      width: 85%;
      max-width: 400px;
      border-radius: 40px;
      padding: 28px 20px 32px;
      text-align: center;
      box-shadow: 0 25px 45px rgba(0,0,0,0.3);
      transform: scale(0.9);
      transition: transform 0.2s ease;
    }

    .modal-overlay.active .modal-container {
      transform: scale(1);
    }

    .modal-icon {
      font-size: 56px;
      margin-bottom: 12px;
    }

    .modal-title {
      font-size: 26px;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 12px;
    }

    .modal-message {
      font-size: 16px;
      color: #475569;
      line-height: 1.45;
      margin-bottom: 28px;
      padding: 0 8px;
    }

    .modal-buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      padding: 12px 26px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.15s;
      font-family: inherit;
      min-width: 110px;
    }

    .btn-confirm {
      background-color: #e53e3e;
      color: white;
    }

    .btn-confirm:active {
      background-color: #b91c1c;
      transform: scale(0.96);
    }

    .btn-cancel {
      background-color: #e2e8f0;
      color: #1e293b;
    }

    .btn-cancel:active {
      background-color: #cbd5e1;
      transform: scale(0.96);
    }

    /* مظهر السلة للعرض */
    .cart-box {
      background: white;
      border-radius: 32px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #f0e3d4;
      padding: 14px 0;
      font-size: 16px;
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .total {
      margin-top: 16px;
      text-align: left;
      font-weight: bold;
      font-size: 18px;
      border-top: 1px dashed #ddd;
      padding-top: 12px;
    }
  </style>
</head>
<body>

<h2 style="text-align:center;">🥤 سلة عصائر طوفان</h2>

<div class="cart-box" id="cartContainer">
  <div class="cart-item">
    <span>🍹 عصير عرائسي طوقان الأقصى</span>
    <span>358 ع.ر</span>
  </div>
  <div class="cart-item">
    <span>🍓 عصير فراولة بالحليب</span>
    <span>361 ع.ر</span>
  </div>
  <div class="cart-item">
    <span>🥜 عصير مكسرات</span>
    <span>364 ع.ر</span>
  </div>
  <div class="total">الإجمالي: 1,083 ع.ر</div>
</div>

<button class="empty-cart-btn" id="openModalBtn">🗑️ إفراغ السلة</button>

<!-- مودال التأكيد الأنيق -->
<div id="cartModal" class="modal-overlay">
  <div class="modal-container">
    <div class="modal-icon">⚠️🧹</div>
    <div class="modal-title">إفراغ السلة؟</div>
    <div class="modal-message">سيتم حذف جميع المنتجات نهائياً.<br>هل أنت متأكد؟</div>
    <div class="modal-buttons">
      <button class="btn btn-cancel" id="cancelBtn">إلغاء</button>
      <button class="btn btn-confirm" id="confirmBtn">حسناً</button>
    </div>
  </div>
</div>

<script>
  // عناصر المودال
  const modal = document.getElementById('cartModal');
  const openBtn = document.getElementById('openModalBtn');
  const confirmBtn = document.getElementById('confirmBtn');
  const cancelBtn = document.getElementById('cancelBtn');
  const cartContainer = document.getElementById('cartContainer');

  // فتح المودال
  openBtn.addEventListener('click', () => {
    modal.classList.add('active');
  });

  // إغلاق المودال
  function closeModal() {
    modal.classList.remove('active');
  }

  // دالة إفراغ السلة الفعلية
  function emptyCart() {
    // حذف كل عناصر السلة
    cartContainer.innerHTML = `
      <div style="text-align:center; padding: 30px 0; color: #888;">
        🛒 السلة فارغة
      </div>
    `;
    closeModal();
    // يمكنك إظهار رسالة قصيرة منبثقة (اختياري)
    // alert("✅ تم إفراغ السلة");
  }

  confirmBtn.addEventListener('click', emptyCart);
  cancelBtn.addEventListener('click', closeModal);

  // إغلاق عند الضغط على الخلفية الرمادية
  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });

  // إغلاق عند الضغط على زر الإلغاء في الجوال (بالإضافة)
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal.classList.contains('active')) {
      closeModal();
    }
  });
</script>

</body>
</html>
