<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>بصمات برو - طوفان الأقصى</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#D4AF37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="بصمات برو">
    
    <!-- تحميل خط Tajawal الفاخر -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <!-- ملف الأصناف المنفصل -->
    <script src="menu-data.js"></script>
    
    <style>
        :root {
            --bg: #0a0a0a;
            --bg-card: #141414;
            --bg-header: #0d0d0d;
            --gold: #c5a059;
            --gold-light: #d4af37;
            --gold-glow: rgba(197, 160, 89, 0.3);
            --red: #ff3333;
            --dark-red: #8b0000;
            --dark-red-glow: rgba(139, 0, 0, 0.3);
            --gray: #1e1e1e;
            --gray-light: #2a2a2a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            max-width: 100%;
            overflow-x: hidden;
            background: var(--bg) !important;
            min-height: 100vh;
            font-family: 'Tajawal', sans-serif;
        }
        
        body {
            background: var(--bg) !important;
            color: #ffffff;
            padding: 0;
            position: relative;
            padding-top: 115px;
        }
        
        /* شريط التمرير المخصص */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: var(--gray);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }
        
        /* الهيدر الثابت */
        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg-header);
            z-index: 100;
            padding: 8px 10px 5px 10px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
            backdrop-filter: blur(10px);
        }
        
        .scroll-content {
            padding: 8px 10px 85px 10px;
        }
        
        /* حقل البحث */
        .inp {
            width: 100%;
            padding: 14px;
            background: var(--gray);
            border: 1px solid rgba(197, 160, 89, 0.3);
            color: var(--gold);
            border-radius: 12px;
            margin-bottom: 10px;
            outline: none;
            font-size: 14px;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.2s ease;
        }
        .inp:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px var(--gold-glow);
        }
        
        /* التبويبات */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .tab {
            flex: 1;
            padding: 10px;
            background: var(--gray);
            border: none;
            color: #aaa;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            font-family: 'Tajawal', sans-serif;
        }
        .tab:active {
            transform: scale(0.96);
            background: var(--gray-light);
        }
        .tab.active {
            background: linear-gradient(135deg, var(--dark-red), #6b0000);
            color: #fff;
            box-shadow: 0 4px 15px var(--dark-red-glow);
        }
        
        /* شريط الأقسام */
        .cat-bar {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 8px;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }
        .cat-item {
            padding: 8px 18px;
            background: var(--gray);
            border: 1px solid rgba(197, 160, 89, 0.2);
            border-radius: 30px;
            font-size: 13px;
            white-space: nowrap;
            color: #aaa;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        .cat-item:active {
            transform: scale(0.95);
            background: var(--gray-light);
        }
        .cat-item.active {
            background: linear-gradient(135deg, var(--gold), #a07e3a);
            color: #000;
            border-color: var(--gold);
            font-weight: bold;
            box-shadow: 0 4px 15px var(--gold-glow);
        }
        
        /* بطاقة الصنف */
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: var(--bg-card);
            border-radius: 12px;
            margin-bottom: 8px;
            border-right: 3px solid var(--gold);
            transition: all 0.2s ease;
        }
        .item:active {
            transform: scale(0.98);
            background: #1a1a1a;
        }
        .item-id {
            color: var(--gold);
            font-weight: bold;
            font-size: 13px;
            margin-left: 10px;
            background: rgba(197, 160, 89, 0.1);
            padding: 2px 8px;
            border-radius: 20px;
        }
        .item-name {
            font-size: 14px;
            flex: 1;
            text-align: right;
            color: #ffffff;
            font-weight: 500;
        }
        .item-price {
            color: var(--gold);
            margin-left: 12px;
            font-weight: bold;
            font-size: 15px;
            min-width: 60px;
            text-align: left;
        }
        .add-btn {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--gray-light), var(--gray));
            color: var(--gold);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 12px;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s ease;
        }
        .add-btn:active {
            transform: scale(0.92);
            background: var(--dark-red);
            color: white;
            border-color: var(--gold);
            box-shadow: 0 4px 15px var(--dark-red-glow);
        }
        
        /* سلة الطلبات */
        .cart-wrapper {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
        }
        #cart-btn {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--dark-red), #6b0000);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            border: 2px solid var(--gold);
            cursor: pointer;
            position: relative;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4), 0 0 15px var(--gold-glow);
            transition: all 0.1s ease;
        }
        #cart-btn:active {
            transform: scale(0.94);
        }
        .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #fff;
            color: #000;
            border-radius: 30px;
            width: 24px;
            height: 24px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .floating-total {
            margin-top: 8px;
            font-size: 12px;
            color: var(--gold);
            font-weight: bold;
            background: rgba(0,0,0,0.9);
            padding: 5px 12px;
            border-radius: 30px;
            white-space: nowrap;
            border: 1px solid rgba(197, 160, 89, 0.3);
        }
        
        /* النافذة المنبثقة */
        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.97);
            z-index: 10001;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-body {
            background: linear-gradient(145deg, #111, #0a0a0a);
            width: 92%;
            max-width: 500px;
            height: auto;
            max-height: 88%;
            border-radius: 24px;
            padding: 22px;
            border: 1px solid var(--gold);
            overflow-y: auto;
            position: relative;
            margin: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 30px var(--gold-glow);
        }
        
        /* صف السلة */
        .cart-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(197, 160, 89, 0.1);
            gap: 10px;
            flex-wrap: wrap;
        }
        .cart-row span:first-child {
            flex: 2;
            font-size: 13px;
            word-break: break-word;
            color: #fff;
        }
        .qty-btn {
            width: 34px;
            height: 34px;
            background: var(--gray);
            color: var(--gold);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.1s ease;
        }
        .qty-btn:active {
            transform: scale(0.92);
            background: var(--dark-red);
            color: white;
        }
        
        /* الأزرار */
        .action-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            margin-top: 12px;
            cursor: pointer;
            transition: all 0.1s ease;
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
        }
        .action-btn:active {
            transform: scale(0.97);
        }
        .internal-btn {
            background: linear-gradient(135deg, var(--gold), #a07e3a);
            color: #000;
            box-shadow: 0 4px 15px var(--gold-glow);
        }
        .external-btn {
            background: linear-gradient(135deg, #25d366, #128C7E);
            color: #000;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }
        .close-btn {
            background: var(--gray);
            color: white;
            border: 1px solid #333;
        }
        .clear-btn {
            background: none;
            color: var(--red);
            border: 1px solid #333;
        }
        .order-buttons {
            display: flex;
            gap: 12px;
            margin: 15px 0;
        }
        .order-buttons button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease;
            font-size: 15px;
        }
        .order-buttons button:active {
            transform: scale(0.96);
        }
        
        /* زر النسخ */
        .copy-btn {
            background: var(--gray);
            color: var(--gold);
            border: 1px solid var(--gold);
            border-radius: 10px;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.1s ease;
            font-weight: bold;
        }
        .copy-btn:active {
            transform: scale(0.95);
            background: var(--gold);
            color: #000;
        }
        
        /* أزرار المفضلة */
        .fav-btn {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: #000;
        }
        .load-fav-btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: #fff;
        }
        
        /* تقسيم الفاتورة - يظهر فقط عند الحاجة */
        .split-box {
            margin: 15px 0;
            padding: 12px;
            background: #161616;
            border: 1px dashed var(--gold);
            border-radius: 14px;
            text-align: center;
            display: none;
        }
        .split-box.visible {
            display: block;
        }
        .split-box input {
            width: 70px;
            padding: 8px;
            background: #0a0a0a;
            border: 1px solid var(--gold);
            color: var(--gold);
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            outline: none;
        }
        
        /* نافذة الحوار المخصصة */
        .custom-dialog {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.97);
            z-index: 20000;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .dialog-box {
            background: linear-gradient(145deg, #1a1a1a, #111);
            padding: 28px;
            border-radius: 28px;
            text-align: center;
            width: 85%;
            max-width: 340px;
            border: 2px solid var(--gold);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 30px var(--gold-glow);
        }
        .dialog-box h3 {
            color: var(--gold);
            margin-bottom: 15px;
            font-size: 22px;
            font-weight: 800;
        }
        .dialog-box p {
            color: #aaa;
            margin-bottom: 15px;
            font-size: 13px;
        }
        .dialog-input {
            width: 100%;
            padding: 14px;
            background: #0a0a0a;
            border: 2px solid var(--gold);
            color: var(--gold);
            border-radius: 16px;
            font-size: 18px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 22px;
            outline: none;
            font-family: 'Tajawal', sans-serif;
        }
        .dialog-input:focus {
            border-color: var(--gold-light);
            box-shadow: 0 0 20px var(--gold-glow);
        }
        .dialog-buttons {
            display: flex;
            gap: 12px;
        }
        .dialog-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease;
            font-size: 14px;
            font-family: 'Tajawal', sans-serif;
        }
        .dialog-btn.confirm {
            background: linear-gradient(135deg, var(--gold), #a07e3a);
            color: #000;
        }
        .dialog-btn.cancel {
            background: var(--gray);
            color: #fff;
        }
        .dialog-btn:active {
            transform: scale(0.96);
        }
        
        /* شاشة البداية */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #0a0a0a, #050505);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 25px;
        }
        .splash-logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--gold);
            animation: pulse 1.2s ease-in-out infinite alternate;
            box-shadow: 0 0 30px var(--gold-glow);
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px var(--gold-glow); }
            100% { transform: scale(1.05); box-shadow: 0 0 50px var(--gold-glow); }
        }
        .splash-restaurant {
            color: #ffffff !important;
            font-size: 32px !important;
            font-weight: 900 !important;
            margin-bottom: 50px;
            letter-spacing: 1px;
            max-width: 260px;
            line-height: 1.4;
            text-align: center;
        }
        .slogan-box {
            border: 2px solid var(--gold);
            border-radius: 24px;
            padding: 14px 22px;
            background: rgba(197, 160, 89, 0.05);
            box-shadow: 0 0 25px var(--gold-glow);
        }
        .splash-slogan {
            color: var(--gold);
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 1px;
            line-height: 1.6;
            margin: 0;
        }
        
        /* رسالة التنبيه */
        .toast-msg {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #27ae60, #1e8449);
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.25s ease;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            font-family: 'Tajawal', sans-serif;
        }
        .toast-msg.show {
            opacity: 1;
        }
        
        /* زر البحث الصوتي */
        .voice-search-btn {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--gold);
            transition: all 0.1s ease;
        }
        .voice-search-btn:active {
            transform: translateY(-50%) scale(0.92);
            color: var(--gold-light);
        }
        .search-container {
            position: relative;
        }
        
        @media (max-width: 480px) {
            body { padding-top: 105px; }
            .fixed-header { padding: 6px 8px 3px 8px; }
            .scroll-content { padding: 6px 8px 80px 8px; }
            .item { padding: 10px 12px; }
            .splash-logo { width: 100px; height: 100px; }
            .splash-restaurant { font-size: 26px !important; max-width: 220px; }
            .toast-msg { font-size: 12px; white-space: nowrap; bottom: 80px; }
            .item-name { font-size: 13px; }
            .item-price { font-size: 13px; min-width: 50px; }
        }
    </style>
</head>
<body>

<div id="splash">
    <img src="https://i.postimg.cc/fS7ksRQm/shʿar-twfan-llbarkwd.png" alt="شعار مطاعم طوفان الأقصى" class="splash-logo">
    <div class="splash-text">
        <div class="splash-restaurant">مطاعم وبروست طوفان الأقصى</div>
        <div style="height: 20px;"></div>
        <div class="slogan-box">
            <div class="splash-slogan">بصمات برو..<br>حيث يبدأ الابتكار، وينتهي التقليد</div>
        </div>
    </div>
</div>

<div class="fixed-header">
    <marquee behavior="scroll" direction="right" scrollamount="5" style="background: #1a1a1a; padding: 8px 0; margin-bottom: 10px; border-radius: 30px; border: 2px solid #c5a059; color: #ffcc66; font-size: 14px; font-weight: bold;">
        <img src="https://i.postimg.cc/MX070ynx/shʿar-mthrk-llbarkwd.png" style="width: 26px; height: 26px; border-radius: 50%; vertical-align: middle; margin: 0 8px;" alt="شعار المطعم">
        🍽️ مرحباً بكم في مطاعم وبروست طوفان الأقصى — أهلاً وسهلاً بكم 🤍 — نتمنى لكم تجربة ممتعة 🍽️
    </marquee>
    
    <div class="search-container">
        <input type="text" class="inp" id="search" placeholder="🔍 ابحث بالاسم أو الرقم...">
        <button class="voice-search-btn" onclick="startVoiceSearch()" title="بحث صوتي">🎤</button>
    </div>
    <div class="tabs">
        <button class="tab active" onclick="setM('الكل', this)">الكل</button>
        <button class="tab" onclick="setM('صبوح وعشاء', this)">صبوح/عشاء</button>
        <button class="tab" onclick="setM('غداء', this)">غداء</button>
    </div>
    <div class="cat-bar" id="catBar"></div>
</div>

<div class="scroll-content" id="scrollContent">
    <div id="menu"></div>
</div>

<div class="cart-wrapper" onclick="openC()">
    <div id="cart-btn">🛒<div class="badge" id="b">0</div></div>
    <div class="floating-total" id="float-t">0 ر.ي</div>
</div>

<div id="modal">
    <div class="modal-body">
        <h3 style="text-align:center; color:var(--gold); margin-top:0; font-size:22px;">🛒 سلة طلباتك</h3>
        <div id="list"></div>
        <h2 id="total" style="text-align:center; color:var(--gold); margin:15px 0; font-size:24px;">0 ر.ي</h2>
        
        <div class="order-buttons">
            <button onclick="showInternalDialog()" class="internal-btn" style="background:linear-gradient(135deg,#c5a059,#a07e3a); color:#000;">🏠 طلب داخلي</button>
            <button onclick="sendExternalOrder()" class="external-btn" style="background:linear-gradient(135deg,#25d366,#128C7E); color:#000;">📍 طلب خارجي</button>
        </div>
        
        <!-- تقسيم الفاتورة - يظهر فقط عند الضغط على زر -->
        <div class="split-box" id="splitBox">
            <label style="color: #aaa; font-size: 12px; display: block; margin-bottom: 8px;">👥 تقسيم الفاتورة (للمجموعات)</label>
            <div style="display: flex; justify-content: center; align-items: center; gap: 8px;">
                <span style="color: #fff; font-size: 13px;">عدد الأشخاص:</span>
                <input type="number" id="num-people" value="1" min="1" oninput="calculateSplit()">
            </div>
            <div id="split-result" style="margin-top: 10px; color: #ff3333; font-weight: bold; font-size: 14px; display: none;">
                نصيب كل شخص: <span id="per-person-price" style="color: var(--gold);">0</span> ر.ي
            </div>
        </div>
        
        <div style="display: flex; gap: 8px; margin: 15px 0; flex-wrap: wrap; justify-content: center;">
            <button onclick="copyCartToClipboard()" class="copy-btn">📋 نسخ الفاتورة</button>
            <button onclick="saveFavoriteMeal()" class="action-btn fav-btn" style="flex:1;">❤️ حفظ كوجبة مفضلة</button>
            <button onclick="loadFavoriteMeal()" class="action-btn load-fav-btn" style="flex:1;">⭐ استدعاء المفضلة</button>
        </div>
        
        <button onclick="toggleSplitBox()" class="action-btn" style="background: #2a2a2a; color: var(--gold); margin-bottom: 5px;">💰 تقسيم الفاتورة</button>
        <button onclick="forceClearCart()" class="action-btn clear-btn">🗑️ إفراغ السلة</button>
        <button onclick="closeC()" class="action-btn close-btn">❌ إغلاق والعودة للقائمة</button>
    </div>
</div>

<div id="toastMsg" class="toast-msg">✅ تمت الإضافة</div>

<script>

    // تبديل ظهور تقسيم الفاتورة
    function toggleSplitBox() {
        const box = document.getElementById('splitBox');

    // =============================================

    function showInternalDialog() {
        if (Object.keys(cart).length === 0) {
            showToast('⚠️ السلة فارغة، أضف أصنافاً أولاً');
            return;
        }
        
        const dialog = document.createElement('div');
        dialog.className = 'custom-dialog';
        dialog.innerHTML = `
            <div class="dialog-box">
                <h3>🏠 طلب داخلي</h3>

                    <button class="dialog-btn confirm" id="confirmDialog">تأكيد</button>
                </div>
            </div>
        `;
        document.body.appendChild(dialog);

        dialog.querySelector('#confirmDialog').onclick = () => {

                showToast('⚠️ الرجاء إدخال رقم الطاولة أو الغرفة');

            dialog.remove();
            showToast('❌ تم إلغاء الطلب');
        };

            if (e.key === 'Enter') {
                dialog.querySelector('#confirmDialog').click();
            }
        };
    }

    // =============================================
    // دوال النظام الأساسية
    // =============================================
    
    function showToast(message) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }
    
    function startVoiceSearch() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            showToast('❌ المتصفح لا يدعم البحث الصوتي');
            return;
        }
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'ar-SA';
        recognition.interimResults = false;
        
        recognition.onstart = () => showToast('🎤 تحدث الآن...');
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            document.getElementById('search').value = transcript;
            render(transcript);
            showToast('🔍 تم البحث عن: ' + transcript);
        };
        recognition.onerror = () => showToast('❌ لم يتم التعرف على الصوت');
        recognition.start();
    }
    
    function saveFavoriteMeal() {
        if (Object.keys(cart).length === 0) { showToast('⚠️ السلة فارغة'); return; }
        localStorage.setItem('favoriteMeal', JSON.stringify(cart));
        showToast('❤️ تم حفظ الوجبة المفضلة');
    }
    
    function loadFavoriteMeal() {
        let saved = localStorage.getItem('favoriteMeal');
        if (!saved) { showToast('⭐ لا توجد وجبة مفضلة'); return; }
        try {
            cart = JSON.parse(saved);
            updateUI();
            showToast('⭐ تم استدعاء الوجبة المفضلة');
        } catch(e) { showToast('❌ خطأ في الاستدعاء'); }
    }
    
    function copyCartToClipboard() {
        if (Object.keys(cart).length === 0) { showToast('⚠️ السلة فارغة'); return; }
        let text = '🍽️ سلة الطلبات\n─────────────────\n';
        let total = 0;
        for(let id in cart) {
            const i = menuItems.find(x => x.id == id);
            if(i) {
                total += i.price * cart[id];
                text += `${i.name} x${cart[id]} = ${i.price * cart[id]} ر.ي\n`;
            }
        }
        text += `─────────────────\n💰 الإجمالي: ${total} ر.ي\n`;
        navigator.clipboard.writeText(text);
        showToast('📋 تم نسخ الفاتورة');
    }
    
    function calculateSplit() {
        const totalText = document.getElementById('total').innerText;
        const totalAmount = parseInt(totalText.replace(/[^0-9]/g, '')) || 0;
        const numPeople = parseInt(document.getElementById('num-people').value) || 1;
        const resultDiv = document.getElementById('split-result');
        const perPersonSpan = document.getElementById('per-person-price');
        if (numPeople > 1 && totalAmount > 0) {
            perPersonSpan.innerText = Math.round(totalAmount / numPeople);
            resultDiv.style.display = 'block';
        } else { resultDiv.style.display = 'none'; }
    }
    
    setTimeout(() => { 
        const splash = document.getElementById('splash'); 
        if(splash) splash.style.display = 'none'; 
        init(); 
    }, 3000);
    
    function init() { 
        if (menuItems && menuItems.length) {
            renderCats(); 
            render();
        } else {
            document.getElementById('menu').innerHTML = '<div style="text-align:center; padding:50px; color:#ff3333;">❌ لا توجد أصناف - تأكد من ملف menu-data.js</div>';
        }
    }
    
    function renderCats() {
        const bar = document.getElementById('catBar');
        if (!menuItems || !menuItems.length) { bar.innerHTML = '<div class="cat-item">لا توجد أصناف</div>'; return; }
        const fItems = currentMeal === 'الكل' ? menuItems : menuItems.filter(i => i.meal === currentMeal || i.meal === 'الكل');
        const uniqueCats = ['الكل', ...new Set(fItems.map(i => i.category))];
        bar.innerHTML = uniqueCats.map(c => `<div class="cat-item ${c === currentCat ? 'active' : ''}" onclick="filterCat('${c.replace(/'/g, "\\'")}')">${c}</div>`).join('');
    }
    
    function filterCat(cat) { currentCat = cat; renderCats(); render(); }
    
    function render(q='') {

        const f = menuItems.filter(i => {
            const mMatch = (currentMeal === 'الكل' || i.meal === currentMeal || i.meal === 'الكل');
            const cMatch = (currentCat === 'الكل' || i.category === currentCat);
            const sMatch = i.name.toLowerCase().includes(searchTerm) || i.id.toString().includes(searchTerm);
            return mMatch && cMatch && sMatch;
        });
        area.innerHTML = f.map(i => `<div class="item"><div style="display:flex; align-items:center; flex-wrap:wrap; flex:1;"><span class="item-id">${i.id}</span><span class="item-name">${i.name}</span></div><div style="display:flex; align-items:center; gap:8px;"><span class="item-price">${i.price}</span><button class="add-btn" onclick="add(${i.id}, 1)">+</button></div></div>`).join('');
    }
    
    function add(id, change) { cart[id] = (cart[id] || 0) + change; if(cart[id] <= 0) delete cart[id]; updateUI(); showToast(); }
    
    function updateUI() {
        const count = Object.values(cart).reduce((a,b)=>a+b,0);
        document.getElementById('b').innerText = count;
        let t = 0;
        for(let id in cart) { const i = menuItems.find(x => x.id == id); if(i) t += i.price * cart[id]; }
        document.getElementById('float-t').innerText = t + " ر.ي";
        if(document.getElementById('modal').style.display === 'flex') renderC();
        calculateSplit();
    }
    
    function openC() { document.getElementById('modal').style.display='flex'; renderC(); }
    function closeC() { document.getElementById('modal').style.display='none'; }
    
    function renderC() {
        const list = document.getElementById('list');
        let t = 0; let h = '';
        for(let id in cart) {
            const i = menuItems.find(x => x.id == id);
            if(i) {
                t += i.price * cart[id];
                h += `<div class="cart-row"><span><span style="color:var(--gold);">${i.id}</span> ${i.name}</span><div style="display:flex; align-items:center; gap:6px;"><button class="qty-btn" onclick="add(${id},-1)">-</button><span style="min-width:25px; text-align:center;">${cart[id]}</span><button class="qty-btn" onclick="add(${id},1)">+</button></div></div>`;
            }
        }
        list.innerHTML = h || '<p style="text-align:center; padding:20px; color:#fff;">🛒 السلة فارغة</p>';
        document.getElementById('total').innerText = t + " ر.ي";
        calculateSplit();
    }
    
    function forceClearCart() {
        if(Object.keys(cart).length === 0) { showToast('⚠️ السلة فارغة'); return; }
        if(confirm('⚠️ هل أنت متأكد من إفراغ السلة؟')) {
            cart = {};
            updateUI();
            closeC();
            showToast('✅ تم إفراغ السلة');
        }
    }
    
    function setM(t, btn) { currentMeal = t; currentCat = 'الكل'; document.querySelectorAll('.tab').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderCats(); render(); }
    
    document.getElementById('search').addEventListener('input', (e)=>render(e.target.value));
</script>
